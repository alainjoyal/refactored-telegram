name: install-netlify-package

on:

  push:

 

jobs:

  check-netlify-version:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

 

      - name: Setup Node.js

        uses: actions/setup-node@v4

        with:

          node-version: "20"

 

      - name: Install Netlify CLI

        run: npm install -g netlify-cli

 

      - name: Show Netlify version

        run: netlify –-version

 

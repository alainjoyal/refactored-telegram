name: Label issues

on:
  issues:
    types: [opened, reopened]

permissions:
  issues: write

jobs:
  label_issues:
    runs-on: ubuntu-latest

    steps:
      - name: Label issues
        uses: andymckay/labeler@1.0.4
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          add-labels: "triage"
